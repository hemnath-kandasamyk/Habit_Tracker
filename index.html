<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HabitGrid — Login</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">

  <div class="login-bg">
    <div class="grid-overlay"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-icon">
          <span class="dot d1"></span>
          <span class="dot d2"></span>
          <span class="dot d3"></span>
          <span class="dot d4"></span>
        </div>
        <h1 class="brand-name">HabitGrid</h1>
        <p class="brand-sub">Track. Streak. Dominate.</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="field-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="off" />
        </div>
        <div class="field-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" />
        </div>
        <div class="error-msg" id="loginError">Invalid credentials. Try again.</div>
        <button type="submit" class="btn-login">
          <span class="btn-text">Enter Grid</span>
          <span class="btn-arrow">→</span>
        </button>
      </form>

      <p class="login-hint">Demo: user1 / 1234 &nbsp;·&nbsp; user2 / 5678</p>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('hg_user')) {
      window.location.href = 'tracker.html';
    }

    const USERS = { hemnath: '9025', velu: '9025' };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      const err = document.getElementById('loginError');

      if (USERS[u] && USERS[u] === p) {
        localStorage.setItem('hg_user', u);
        document.querySelector('.btn-login').innerHTML = '<span class="btn-text">Loading…</span>';
        setTimeout(() => window.location.href = 'tracker.html', 400);
      } else {
        err.classList.add('visible');
        document.getElementById('password').value = '';
        setTimeout(() => err.classList.remove('visible'), 3000);
      }
    });
  </script>
</body>
</html>
